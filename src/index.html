<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Codex CLI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌘</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080810;--surface:#0f0f1a;--surface2:#16162a;--border:#1e1e36;--text:#d0d0e0;--text-dim:#7a7a94;--accent:#7c5cfc;--accent2:#5a3fd4;--accent-glow:rgba(124,92,252,.2);--green:#4ade80;--orange:#fb923c;--red:#ef4444;--pink:#e879f9;--radius:10px;--sidebar-w:280px;--font:ui-monospace,'SFMono-Regular','Cascadia Code',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;overflow:hidden;display:flex}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s,width .3s;overflow:hidden;z-index:10}
.sidebar.hidden{width:0;border:none}
.sidebar.hidden .sidebar-inner{transform:translateX(-100%)}
.sidebar-inner{display:flex;flex-direction:column;height:100%;width:var(--sidebar-w);min-width:var(--sidebar-w)}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.sidebar-header h2 span{background:var(--accent);color:#fff;font-size:9px;padding:1px 6px;border-radius:3px}
.sidebar-header button{background:var(--accent);border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:11px;font-family:var(--font);cursor:pointer;font-weight:600}
.sidebar-header button:hover{background:var(--accent2)}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-tabs button{flex:1;background:transparent;border:none;color:var(--text-dim);padding:10px;font-size:11px;font-family:var(--font);cursor:pointer;font-weight:600;transition:all .2s;position:relative}
.sidebar-tabs button:hover{color:var(--text)}
.sidebar-tabs button.active{color:var(--accent)}
.sidebar-tabs button.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:1px}
.sidebar-content{flex:1;overflow-y:auto;padding:8px}
.sidebar-content .section-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);padding:12px 8px 4px;font-weight:600}
.session-item{padding:8px 10px;border-radius:6px;cursor:pointer;transition:background .15s;margin-bottom:2px}
.session-item:hover{background:var(--surface2)}
.session-item.active{background:var(--accent-glow);border-left:2px solid var(--accent)}
.session-item .s-time{font-size:10px;color:var(--text-dim)}
.session-item .s-preview{font-size:12px;color:var(--text);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-item .s-count{font-size:10px;color:var(--text-dim);margin-top:1px}
.session-item .del-btn{background:transparent;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;padding:2px 4px;border-radius:3px;opacity:0;transition:opacity .15s;flex-shrink:0;margin-left:4px;line-height:1}
.session-item:hover .del-btn{opacity:.6}
.session-item .del-btn:hover{opacity:1;color:var(--red);background:var(--surface2)}
.skill-item{padding:8px 10px;border-radius:6px;margin-bottom:4px;background:var(--surface2);border:1px solid var(--border)}
.skill-item .s-name{font-size:12px;font-weight:600;color:var(--text)}
.skill-item .s-desc{font-size:10px;color:var(--text-dim);margin-top:2px}
.skill-item .s-badge{display:inline-block;background:var(--accent-glow);color:var(--accent);font-size:9px;padding:1px 6px;border-radius:3px;margin-top:4px;font-weight:600}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;position:relative}
.menu-btn{background:transparent;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px 6px;border-radius:4px;line-height:1}
.menu-btn:hover{color:var(--text);background:var(--surface2)}
header .logo{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
header .logo span{background:var(--accent);color:#fff;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600}
header .spacer{flex:1}
header .hdr-status{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--text-dim)}
header .hdr-status .dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}
.msgs{flex:1;overflow-y:auto;padding:16px 20px 0;display:flex;flex-direction:column;gap:4px}
.msgs-inner{max-width:800px;width:100%;margin:0 auto}
.msg{animation:fadeIn .2s ease-out;margin-bottom:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg .head{display:flex;align-items:center;gap:8px;padding:4px 12px 2px;font-size:10px;color:var(--text-dim)}
.msg .head .role{font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.msg .head .time{color:var(--text-dim);opacity:.6}
.msg .head .copy-btn{margin-left:auto;background:transparent;border:none;color:var(--text-dim);font-size:11px;cursor:pointer;padding:2px 6px;border-radius:3px;opacity:0;transition:opacity .2s}
.msg:hover .head .copy-btn{opacity:1}
.msg .head .copy-btn:hover{background:var(--surface2);color:var(--accent)}
.msg.user .bubble{background:var(--accent);color:#fff;display:inline-block;padding:10px 16px;border-radius:12px 12px 4px 12px;font-size:13px;max-width:85%;line-height:1.5;word-break:break-word;margin-left:auto;margin-right:12px}
.msg.assistant .bubble{background:var(--surface);border:1px solid var(--border);padding:14px 18px;border-radius:12px 12px 12px 4px;font-size:13px;line-height:1.6;word-break:break-word;white-space:pre-wrap;margin-left:12px;margin-right:auto}
.msg.assistant .bubble>*{white-space:normal}
.msg.assistant .bubble :is(h1,h2,h3,h4){margin:12px 0 6px;color:var(--text);font-size:14px}
.msg.assistant .bubble p{margin:4px 0}
.msg.assistant .bubble code{background:var(--bg);padding:2px 6px;border-radius:4px;font-size:12px;font-family:var(--font);color:var(--accent)}
.msg.assistant .bubble pre{background:var(--bg);border:1px solid var(--border);border-radius:6px;margin:8px 0;position:relative}
.msg.assistant .bubble pre .copy{position:absolute;right:6px;top:6px;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:4px 8px;border-radius:4px;font-size:10px;cursor:pointer;font-family:var(--font);transition:all .15s;z-index:1}
.msg.assistant .bubble pre .copy:hover{background:var(--accent);color:#fff}
.msg.assistant .bubble pre code{background:transparent;padding:12px 14px;display:block;overflow-x:auto;font-size:12px;line-height:1.5;color:var(--text);border:none}
.msg.tool .bubble{padding:4px 12px;font-size:11px;color:var(--orange);display:flex;align-items:flex-start;gap:8px;margin-left:12px;margin-right:auto}
.msg.tool .bubble .info{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.msg.tool .bubble .info .name{font-weight:600;color:var(--pink)}
.msg.tool .bubble .info .args{color:var(--text-dim);font-size:10px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg.tool .bubble .result{margin-top:4px;margin-left:0;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:10px;max-height:80px;overflow-y:auto;width:100%;white-space:pre-wrap;font-family:var(--font)}
.msg.reasoning .bubble{background:var(--surface);border:1px dashed var(--border);padding:8px 14px;border-radius:8px;font-size:11px;color:var(--text-dim);line-height:1.5;margin-left:12px;margin-right:auto;cursor:pointer;max-width:85%}
.msg.reasoning .bubble .summary{display:flex;align-items:center;gap:6px}
.msg.reasoning .bubble .summary .arrow{transition:transform .2s}
.msg.reasoning .bubble .summary .arrow.open{transform:rotate(90deg)}
.msg.reasoning .bubble .content{display:none;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;line-height:1.5;color:var(--text-dim);max-height:200px;overflow-y:auto}
.msg.reasoning .bubble .content.open{display:block}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--text-dim);padding:40px;text-align:center}
.empty-state h2{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.empty-state p{font-size:13px;max-width:360px;line-height:1.5}
.empty-state .shortcuts{display:flex;gap:16px;margin-top:4px;font-size:11px}
.empty-state .shortcuts span{display:flex;align-items:center;gap:4px}
.empty-state .shortcuts kbd{background:var(--surface);border:1px solid var(--border);padding:2px 6px;border-radius:3px;font-size:10px;font-family:var(--font)}
.input-wrap{flex-shrink:0;padding:12px 20px 18px;background:linear-gradient(0deg,var(--bg) 60%,transparent)}
.input-row{max-width:800px;margin:0 auto;display:flex;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;transition:border-color .2s}
.input-row:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.input-row textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:13px;padding:8px 10px;resize:none;line-height:1.4;min-height:20px;max-height:120px}
.input-row textarea::placeholder{color:var(--text-dim)}
.input-row button{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 14px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;align-self:flex-end;margin:4px;min-width:60px;display:flex;align-items:center;justify-content:center;gap:4px}
.input-row button:hover{background:var(--accent2)}
.input-row button:disabled{opacity:.4;cursor:not-allowed}
.input-row button.stop{background:var(--red)}
.input-row button.stop:hover{background:#dc2626}
.status-bar{max-width:800px;margin:6px auto 0;display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);padding:0 4px}
.streaming-dots{display:inline-flex;gap:3px;padding:4px 0}
.streaming-dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:bounce 1.2s ease-in-out infinite}
.streaming-dots span:nth-child(2){animation-delay:.2s}
.streaming-dots span:nth-child(3){animation-delay:.4s}
.thinking-msg .bubble{background:var(--surface);border:1px solid var(--border);padding:14px 18px;border-radius:12px 12px 12px 4px;margin-left:12px;margin-right:auto;max-width:200px;display:flex;align-items:center;gap:10px}
.thinking-msg .bubble .label{font-size:12px;color:var(--text-dim)}
.thinking-msg .bubble .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.pulse-bar{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);background-size:200% 100%;animation:pulseBar 1.5s ease-in-out infinite;opacity:.6}
@keyframes pulseBar{0%{background-position:200% 0}100%{background-position:-200% 0}}
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);padding:8px 16px;border-radius:6px;font-size:11px;color:var(--text);opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
#toast.show{opacity:1}
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="sidebar-inner">
    <div class="sidebar-header">
      <h2>⌘ codex <span>v1</span></h2>
      <button id="newChatBtn">+ New</button>
    </div>
    <div class="sidebar-tabs">
      <button class="active" data-tab="sessions" id="tabSessions">Chats</button>
      <button data-tab="skills" id="tabSkills">Skills</button>
    </div>
    <div class="sidebar-content" id="sidebarContent"></div>
  </div>
</div>
<div class="main">
  <header>
      <button class="menu-btn" id="menuBtn">☰</button>
    <div class="logo">⌘ codex <span>AI</span></div>
    <div class="spacer"></div>
    <div class="hdr-status">
      <span class="dot"></span>
      <span id="provider">opencode/big-pickle</span>
      <span id="stats">0 msgs · $0</span>
    </div>
    <div id="pulseBar" class="pulse-bar" style="display:none"></div>
  </header>
  <div class="msgs" id="msgs">
    <div class="msgs-inner">
      <div class="empty-state" id="empty">
        <h2>Codex CLI</h2>
        <p>AI coding agent with full file and shell access on your machine.</p>
        <div class="shortcuts">
          <span><kbd>Enter</kbd> send</span>
          <span><kbd>Shift+Enter</kbd> new line</span>
          <span><kbd>Ctrl+K</kbd> search</span>
        </div>
      </div>
    </div>
  </div>
  <div class="input-wrap">
    <div class="input-row">
      <textarea id="input" placeholder="Ask me anything..." rows="1"></textarea>
      <button id="sendBtn">Send</button>
    </div>
    <div class="status-bar">
      <span id="sessionId"></span>
      <span id="tokenInfo">free</span>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
const msgs = document.getElementById('msgs');
const msgsInner = msgs.querySelector('.msgs-inner');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
let empty = document.getElementById('empty');
const providerEl = document.getElementById('provider');
const statsEl = document.getElementById('stats');
const sessionIdEl = document.getElementById('sessionId');
const tokenInfoEl = document.getElementById('tokenInfo');
const sidebar = document.getElementById('sidebar');
const sidebarContent = document.getElementById('sidebarContent');

let sessionId = null;
let assistantEl = null;
let assistantBuf = '';
let reasoningEl = null;
let reasoningBuf = '';
let thinkingEl = null;
let busy = false;
let autoScroll = true;

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function toggleSidebar() { sidebar.classList.toggle('hidden') }

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const yesterday = new Date(now); yesterday.setDate(yesterday.getDate()-1);
  const isYesterday = d.toDateString() === yesterday.toDateString();
  if (sameDay) return formatTime(ts);
  if (isYesterday) return 'Yesterday ' + formatTime(ts);
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + formatTime(ts);
}

function scrollBottom() {
  if (!autoScroll) return;
  requestAnimationFrame(() => { msgs.scrollTop = msgs.scrollHeight });
}

msgs.addEventListener('scroll', () => {
  const dist = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight;
  autoScroll = dist < 40;
});

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMarkdown(text) {
  let h = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      const c = code.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
      return '<pre><button class="copy" onclick="copyBlock(this)">copy</button><code>' + escapeHtml(c) + '</code></pre>';
    })
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
  return h;
}

function copyBlock(btn) {
  const code = btn.parentElement.querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'copied!';
    setTimeout(() => btn.textContent = 'copy', 1500);
  });
}

function addBubble(role, html, extra) {
  empty?.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const head = document.createElement('div');
  head.className = 'head';
  const roleLabel = { user: 'You', assistant: 'Codex', tool: 'Tool', reasoning: 'Thinking' }[role] || role;
  head.innerHTML = '<span class="role">' + roleLabel + '</span><span class="time">' + formatTime(Date.now()) + '</span>';
  if (role === 'user' || role === 'assistant') {
    const cb = document.createElement('button');
    cb.className = 'copy-btn'; cb.textContent = 'copy';
    cb.onclick = () => {
      const txt = div.querySelector('.bubble')?.textContent || '';
      navigator.clipboard.writeText(txt).then(() => toast('Copied!'));
    };
    head.appendChild(cb);
  }
  div.appendChild(head);
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  div.appendChild(bubble);
  if (extra) Object.assign(div.dataset, extra);
  msgsInner.appendChild(div);
  scrollBottom();
  return div;
}

function updateAssistant(text) {
  hideThinking();
  if (!assistantEl) {
    assistantEl = addBubble('assistant', '<span></span>');
    assistantBuf = '';
  }
  const span = assistantEl.querySelector('.bubble span');
  assistantBuf += text;
  span.innerHTML = renderMarkdown(assistantBuf);
  scrollBottom();
}

function showReasoning(text) {
  hideThinking();
  if (!reasoningEl) {
    reasoningEl = addBubble('reasoning',
      '<div class="summary"><span class="arrow">▸</span> <span>Show reasoning</span></div><div class="content"></div>');
    reasoningEl.querySelector('.bubble').onclick = function(e) {
      if (e.target.closest('.copy-btn')) return;
      const arrow = this.querySelector('.arrow');
      const content = this.querySelector('.content');
      const isOpen = content.classList.toggle('open');
      arrow.classList.toggle('open', isOpen);
    };
  }
  reasoningBuf += text;
  const content = reasoningEl.querySelector('.content');
  content.textContent = reasoningBuf;
  scrollBottom();
}

function showToolCall(name, args) {
  const a = typeof args === 'string' ? args : JSON.stringify(args);
  addBubble('tool', '<div class="info"><span>⚙</span><span class="name">' + name + '</span><span class="args">' + escapeHtml(a) + '</span></div>');
}

function showToolResult(name, result) {
  const el = msgsInner.querySelector('.msg.tool:last-child .bubble');
  if (el) {
    const r = document.createElement('div');
    r.className = 'result';
    r.textContent = (typeof result === 'string' ? result : JSON.stringify(result)).substring(0, 600);
    el.appendChild(r);
  }
  scrollBottom();
}

function showError(msg) {
  addBubble('assistant', '<span style="color:var(--red)">⚠ Error: ' + escapeHtml(msg) + '</span>');
}

function setBusy(b) {
  busy = b;
  document.getElementById('pulseBar').style.display = b ? 'block' : 'none';
  if (b) {
    sendBtn.textContent = '■ Stop';
    sendBtn.className = 'stop';
    input.disabled = true;
    showThinking();
  } else {
    sendBtn.textContent = 'Send';
    sendBtn.className = '';
    input.disabled = false;
    input.focus();
    hideThinking();
  }
}

function showThinking() {
  hideThinking();
  empty?.remove();
  const div = document.createElement('div');
  div.className = 'msg thinking-msg';
  div.id = 'thinkingMsg';
  div.innerHTML = '<div class="bubble"><div class="spinner"></div><span class="label">Thinking...</span></div>';
  msgsInner.appendChild(div);
  scrollBottom();
}

function hideThinking() {
  const el = document.getElementById('thinkingMsg');
  if (el) el.remove();
}

async function sendMessage(text) {
  if (busy || !text.trim()) return;
  setBusy(true);
  addBubble('user', escapeHtml(text));
  assistantEl = null; assistantBuf = '';
  reasoningEl = null; reasoningBuf = '';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId }),
    });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const ev = JSON.parse(line.slice(6));
          switch (ev.type) {
            case 'token': updateAssistant(ev.content); break;
            case 'reasoning': showReasoning(ev.content); break;
            case 'tool_start': showToolCall(ev.name, ev.args); break;
            case 'tool_end': showToolResult(ev.name, ev.result); break;
            case 'session': sessionId = ev.id; sessionIdEl.textContent = sessionId?.substring(0, 8) || ''; loadSessions(); break;
            case 'status':
              providerEl.textContent = ev.provider + '/' + ev.model;
              statsEl.textContent = ev.msgs + ' msgs · $' + ev.cost.toFixed(4);
              tokenInfoEl.textContent = 'free';
              break;
            case 'stopped':
              assistantEl = null; assistantBuf = '';
              reasoningEl = null; reasoningBuf = '';
              toast('Stopped');
              break;
            case 'done':
              assistantEl = null; assistantBuf = '';
              reasoningEl = null; reasoningBuf = '';
              loadSessions();
              break;
            case 'error': showError(ev.content); break;
          }
        } catch(e) {}
      }
    }
  } catch(err) {
    if (err.name !== 'AbortError') showError('Connection: ' + err.message);
  }
  setBusy(false);
}

function stopGeneration() {
  fetch('/api/stop', { method: 'POST' }).catch(() => {});
  setBusy(false);
}

sendBtn.addEventListener('click', () => {
  if (busy) { stopGeneration(); return; }
  const text = input.value.trim();
  if (text) { input.value = ''; input.style.height = 'auto'; sendMessage(text); }
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = input.value.trim();
    if (busy) { stopGeneration(); return; }
    if (text) { input.value = ''; input.style.height = 'auto'; sendMessage(text); }
  }
  if (e.key === 'k' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    toggleSidebar();
  }
});

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

function switchTab(tab) {
  document.querySelectorAll('.sidebar-tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  if (tab === 'sessions') loadSessions();
  else if (tab === 'skills') loadSkills();
}

function showEmpty() {
  msgsInner.innerHTML = '<div class="empty-state" id="empty"><h2>Codex CLI</h2><p>AI coding agent with full file and shell access on your machine.</p><div class="shortcuts"><span><kbd>Enter</kbd> send</span><span><kbd>Shift+Enter</kbd> new line</span><span><kbd>Ctrl+K</kbd> search</span></div></div>';
  empty = document.getElementById('empty');
}

async function newChat() {
  try {
    const res = await fetch('/api/session/new', { method: 'POST' });
    const data = await res.json();
    sessionId = data.id;
    sessionIdEl.textContent = sessionId?.substring(0, 8) || '';
    showEmpty();
    loadSessions();
    toast('New chat created');
  } catch(e) { toast('Error'); }
}

async function loadSession(id) {
  if (busy) stopGeneration();
  try {
    const res = await fetch('/api/session/load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id }),
    });
    if (!res.ok) return toast('Session not found');
    const data = await res.json();
    sessionId = data.id;
    sessionIdEl.textContent = sessionId?.substring(0, 8) || '';
    assistantEl = null; assistantBuf = '';
    reasoningEl = null; reasoningBuf = '';
    const msgs = Array.isArray(data.messages) ? data.messages : [];
    if (!msgs.length) { showEmpty(); loadSessions(); return toast('Session is empty'); }
    let html = '';
    for (const m of msgs) {
      const role = m.role || 'unknown';
      const ts = formatTime(m.created || Date.now());
      if (role === 'user') {
        html += '<div class="msg user"><div class="head"><span class="role">You</span><span class="time">' + ts + '</span></div><div class="bubble">' + escapeHtml(m.content || '') + '</div></div>';
      } else if (role === 'assistant') {
        if (m.tool_calls && !m.content) continue;
        if (m.reasoning_content) {
          html += '<div class="msg reasoning"><div class="head"><span class="role">Thinking</span><span class="time">' + ts + '</span></div><div class="bubble"><div class="summary"><span class="arrow">▸</span> <span>Show reasoning</span></div><div class="content">' + escapeHtml(m.reasoning_content) + '</div></div></div>';
        }
        html += '<div class="msg assistant"><div class="head"><span class="role">Codex</span><span class="time">' + ts + '</span></div><div class="bubble">' + renderMarkdown(m.content || '') + '</div></div>';
      } else if (role === 'tool') {
        const toolName = m.tool_name || m.name || 'Tool';
        html += '<div class="msg tool"><div class="head"><span class="role">Tool</span><span class="time">' + ts + '</span></div><div class="bubble"><div class="info"><span>⚙</span><span class="name">' + escapeHtml(toolName) + '</span></div><div class="result">' + escapeHtml((m.content || '').substring(0, 600)) + '</div></div></div>';
      } else {
        html += '<div class="msg"><div class="head"><span class="role">' + escapeHtml(role) + '</span><span class="time">' + ts + '</span></div><div class="bubble">' + escapeHtml(m.content || '') + '</div></div>';
      }
    }
    msgsInner.innerHTML = html;
    empty = null;
    loadSessions();
    toast('Loaded ' + msgs.length + ' messages');
  } catch(e) { toast('Error: ' + e.message); }
}

async function loadSessions() {
  try {
    const res = await fetch('/api/sessions');
    const sessions = await res.json();
    let html = '<div class="section-title">Recent Chats</div>';
    if (!sessions.length) html += '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:11px">No chats yet. Start a new conversation!</div>';
    for (const s of sessions) {
      const active = s.id === sessionId ? ' active' : '';
      const preview = s.preview || '(empty)';
      const date = formatDate(s.updated || s.created);
      html += '<div class="session-item' + active + '" data-sid="' + s.id + '"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1;min-width:0"><div class="s-time">' + date + '</div><div class="s-preview">' + escapeHtml(preview) + '</div><div class="s-count">' + s.msgCount + ' messages</div></div><button class="del-btn" data-sid="' + s.id + '" title="Delete">✕</button></div></div>';
    }
    sidebarContent.innerHTML = html;
  } catch(e) {}
}

async function deleteSession(id) {
  try {
    const res = await fetch('/api/session/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id }),
    });
    if (res.ok) {
      if (id === sessionId) {
        sessionId = null;
        sessionIdEl.textContent = '';
        showEmpty();
      }
      loadSessions();
      toast('Chat deleted');
    }
  } catch(e) { toast('Error deleting'); }
}

async function loadSkills() {
  try {
    const res = await fetch('/api/skills');
    const skills = await res.json();
    let html = '<div class="section-title">Installed Skills & Plugins</div>';
    if (!skills.length) html += '<div style="padding:24px 16px;text-align:center;color:var(--text-dim);font-size:12px;line-height:1.6">No skills found<br><span style="font-size:10px;opacity:.6">Skills are installed via the skill-installer or placed in ~/.codex/skills/</span></div>';
    for (const s of skills) {
      html += '<div class="skill-item"><div class="s-name">' + escapeHtml(s.name) + '</div><div class="s-desc">' + escapeHtml(s.description) + '</div><span class="s-badge">' + (s.hasSkillMd ? '✓ active' : 'plugin') + '</span></div>';
    }
    sidebarContent.innerHTML = html;
  } catch(e) {}
}

sidebarContent.addEventListener('click', (e) => {
  const delBtn = e.target.closest('.del-btn');
  if (delBtn) {
    const id = delBtn.dataset.sid;
    if (id) { e.stopPropagation(); deleteSession(id); }
    return;
  }
  const item = e.target.closest('.session-item');
  if (item) {
    const id = item.dataset.sid;
    if (id) loadSession(id);
  }
});

document.getElementById('menuBtn').addEventListener('click', toggleSidebar);
document.getElementById('newChatBtn').addEventListener('click', newChat);
document.getElementById('tabSessions').addEventListener('click', () => switchTab('sessions'));
document.getElementById('tabSkills').addEventListener('click', () => switchTab('skills'));

input.focus();
loadSessions();
</script>
</body>
</html>
